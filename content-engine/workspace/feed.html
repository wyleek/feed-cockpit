  feed.innerHTML=stories.map((s,i)=>cardHTML(s,i)).join('');

  // wire interactions
  feed.querySelectorAll('.expandbtn,.headline').forEach(el=>{
    el.addEventListener('click',e=>{
      const card=e.target.closest('.card');
      card.classList.toggle('open');
      if(card.classList.contains('open')) animateBars(card);
    });
  });
  feed.querySelectorAll('.pickbtn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const id=e.target.dataset.id;
      const cmd='generate #'+id;
      copy(cmd);
      toast('Copied <b>'+esc(cmd)+'</b> — paste in Claude Code to build it');
    });
  });
}

function cardHTML(s,i){
  const rank=String(i+1).padStart(2,'0');
  const statusChip = s.status!=='new'
    ? `<span class="status-chip ${esc(s.status)}">${esc(s.status)}</span>` : '';
  const srcChips=s.sources.map(src=>
    `<a class="src" href="${esc(src.url)}" target="_blank" rel="noopener">
       <span class="tierbadge">T${esc(src.tier)}</span>${esc(src.outlet)}
     </a>`).join('');
  const genChip=s.generated.length
    ? `<span class="gen-chip">${s.generated.map(g=>`<b>${esc(g.component)} \u2713</b>`).join(' · ')}</span>` : '';
  const bars=Object.entries(s.score_breakdown).map(([k,v])=>
    `<div class="bar"><span class="blbl">${esc(k.replace(/_/g,' '))}</span>
       <span class="track"><span class="fill" data-v="${v}"></span></span>
       <span class="bval">${v}</span></div>`).join('');
  const srcList=s.sources.map(src=>
    `<a href="${esc(src.url)}" target="_blank" rel="noopener">
       <span class="role">${esc(src.role)}</span>
       <span class="tval">Tier ${esc(src.tier)}</span>
       <span>${esc(src.outlet)}</span></a>`).join('');

  return `
  <article class="card ${esc(s.angle_tag)}${s.pinned?' pinned':''}">
    <div class="toprow">
      <div class="rank">${rank}</div>
      <div class="scorebox"><div class="score">${s.score.toFixed(1)}</div><div class="scorelbl">score</div></div>
      <div class="headcol">
        <div class="headline">${esc(s.headline)}${statusChip}</div>
        <div class="summary">${esc(s.summary)}</div>
        <div class="angle">
          <span class="tag ${esc(s.angle_tag)}">${esc(s.angle_tag)}</span>
          <span class="line">${esc(s.angle_line)}</span>
        </div>
        <div class="footrow">
          ${srcChips}
          <span class="verified">\u2713 ${esc(s.verification)}</span>
          ${genChip}
          <div class="actions">
            <button class="pickbtn" data-id="${esc(s.id)}">Pick &amp; copy command</button>
            <button class="expandbtn" aria-label="Show details">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="detail"><div class="detail-inner"><div class="detail-pad">
      <div><h4>Score breakdown</h4><div class="bars">${bars}</div></div>
      <div><h4>Caveats carried into generation</h4><div class="caveat">${esc(s.caveats)}</div></div>
      <div><h4>Sources &amp; roles</h4><div class="srclist">${srcList}</div></div>
    </div></div></div>
  </article>`;
}

function animateBars(card){
  card.querySelectorAll('.fill').forEach(f=>{
    requestAnimationFrame(()=>{f.style.width=(f.dataset.v*10)+'%';});
  });
}
function copy(t){
  navigator.clipboard?.writeText(t).catch(()=>{});
}
let toastTimer;
function toast(html){
  const el=$('#toast');el.innerHTML=html;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3200);
}

/* stagger the card entrance */
render();
document.querySelectorAll('.card').forEach((c,i)=>{c.style.animationDelay=(i*60)+'ms';});
</script>
</body>
</html>
