<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Cockpit — wellness-genz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --porcelain:#F4F5F2;--paper:#FFFFFF;--ink:#1A211D;--ink-soft:#5E6862;--ink-faint:#8A918B;
    --sage:#5C7D6A;--amber:#C2912F;--stone:#A2A8A1;--clay:#BD6B3E;--rose:#B85C6E;
    --hairline:#E2E5DF;--hairline-strong:#D2D6CE;
    --shadow:0 1px 2px rgba(26,33,29,.04),0 8px 24px -16px rgba(26,33,29,.25);--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--porcelain);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;padding:0 20px 80px}
  .wrap{max-width:760px;margin:0 auto}

  /* ── header ── */
  header.masthead{padding:38px 0 22px;border-bottom:1.5px solid var(--ink);margin-bottom:6px}
  .brandrow{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-family:'Newsreader',serif;font-weight:600;font-size:34px;letter-spacing:-.01em;line-height:1;display:flex;align-items:baseline;gap:12px}
  .brand .pack{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--sage);border:1px solid var(--sage);border-radius:999px;padding:3px 9px;transform:translateY(-4px)}
  .dateline{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);letter-spacing:.02em;text-align:right}
  .standfirst{margin-top:14px;font-family:'Newsreader',serif;font-style:italic;font-size:16px;color:var(--ink-soft);max-width:52ch}
  .metabar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:18px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.03em;color:var(--ink-soft)}
  .metabar b{color:var(--ink);font-weight:600}

  /* ── sort controls ── */
  .sortbar{display:flex;gap:4px;align-items:center;margin-left:4px}
  .sortbar-label{font-size:10.5px;color:var(--ink-faint);margin-right:2px}
  .sortbtn{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);background:none;border:1px solid var(--hairline-strong);border-radius:6px;padding:4px 9px;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .sortbtn:hover{background:var(--paper);color:var(--ink)}
  .sortbtn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* ── header buttons ── */
  .headerbtns{margin-left:auto;display:flex;gap:6px;align-items:center}
  .headerbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);background:none;border:1px solid var(--hairline-strong);border-radius:7px;padding:5px 11px;cursor:pointer;transition:background .15s,color .15s,border-color .15s;white-space:nowrap}
  .headerbtn:hover{background:var(--paper);color:var(--ink)}
  .headerbtn:disabled{opacity:.5;cursor:default}
  .headerbtn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .genbadge{display:inline-block;background:var(--sage);color:var(--paper);border-radius:99px;font-size:9px;padding:1px 5px;margin-left:4px;vertical-align:middle;line-height:1.4}

  /* ── notices ── */
  .notice{margin-top:20px;padding:14px 16px;border-radius:10px;font-size:13.5px;line-height:1.5;display:none}
  .notice.warn{display:block;background:#FBF3E9;border:1px solid #ECD9BD;color:#7A5A12}
  .notice.err{display:block;background:#FBEDE7;border:1px solid #EBCBBB;color:#8A4422}
  .notice code{font-family:'IBM Plex Mono',monospace;font-size:12px;background:rgba(0,0,0,.05);padding:2px 6px;border-radius:4px}

  /* ── auto-update banner ── */
  .update-banner{display:none;margin-top:14px;padding:10px 14px;background:#EAF2EC;border:1px solid #C2D9C8;border-radius:9px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#3C5848;align-items:center;gap:10px}
  .update-banner.show{display:flex}
  .update-banner button{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--sage);color:white;border:none;border-radius:5px;padding:4px 10px;cursor:pointer}

  /* ── views ── */
  .view-pane{display:none}
  .view-pane.active{display:block}

  /* ── feed ── */
  .feed{margin-top:26px;display:flex;flex-direction:column;gap:14px}

  /* ── cards ── */
  .card{position:relative;background:var(--paper);border:1px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px 18px 26px;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--stone)}
  .card.native::before{background:var(--sage)}.card.bridge::before{background:var(--amber)}
  .card.stretch::before,.card.unscored::before{background:var(--stone)}
  .card.is-new{border-color:var(--sage);border-width:1.5px}
  .card.is-new::before{background:var(--sage)}
  .card.pinned{border-color:var(--rose);border-width:1.5px}
  .card.pinned::before{background:var(--rose)}
  .card-tags{position:absolute;top:0;right:0;display:flex;gap:4px;padding:4px 8px;border-bottom-left-radius:9px}
  .card-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.12em;padding:3px 7px;border-radius:4px}
  .card-tag--pinned{color:var(--rose);background:#FBF0F2}
  .card-tag--new{color:var(--sage);background:#E4EDE6}

  .toprow{display:flex;align-items:flex-start;gap:14px}
  .rank{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--ink-faint);padding-top:5px;min-width:22px}
  .scorebox{text-align:center;min-width:48px;padding-top:1px}
  .score{font-family:'Newsreader',serif;font-weight:600;font-size:27px;line-height:1;color:var(--clay)}
  .scorelbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ink-faint);text-transform:uppercase;margin-top:3px}
  .headcol{flex:1;min-width:0}
  .headline{font-family:'Newsreader',serif;font-weight:600;font-size:20px;line-height:1.22;letter-spacing:-.005em;color:var(--ink)}
  .summary{margin-top:9px;color:var(--ink-soft);font-size:14.5px}
  .tagrow{margin-top:11px;display:flex;flex-wrap:wrap;gap:6px}
  .kw{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);background:var(--porcelain);border-radius:5px;padding:3px 8px}
  .angle{margin-top:13px;display:flex;gap:9px;align-items:flex-start;padding:10px 12px;background:var(--porcelain);border-radius:9px}
  .angle .tag{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
  .tag.native{color:#3C5848;background:#E4EDE6}.tag.bridge{color:#7A5A12;background:#F3E9CF}
  .tag.stretch{color:#5C625B;background:#E9EBE7}.tag.unscored{color:#5C625B;background:#E9EBE7}
  .angle .line{font-size:13.5px;line-height:1.45;color:var(--ink-soft);font-style:italic}
  .footrow{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .src{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);text-decoration:none;border:1px solid var(--hairline);border-radius:6px;padding:4px 9px;display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,color .15s}
  .src:hover{border-color:var(--sage);color:var(--ink)}
  .src .tierbadge{font-weight:600;color:var(--sage)}
  .verified{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--sage);display:inline-flex;align-items:center;gap:5px}
  .gen-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);background:var(--porcelain);border-radius:5px;padding:3px 7px}
  .gen-chip b{color:var(--sage)}
  .pub-date{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin-top:8px}
  .actions{margin-left:auto;display:flex;gap:6px;align-items:center}
  .pickbtn{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;color:var(--paper);background:var(--ink);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;transition:background .15s,transform .08s}
  .pickbtn:hover{background:#2C362F}.pickbtn:active{transform:translateY(1px)}
  .pickbtn.active{background:var(--sage)}

  /* ── pin button ── */
  .pinbtn{background:none;border:1px solid var(--hairline-strong);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);transition:background .15s,color .15s,border-color .15s;flex-shrink:0}
  .pinbtn:hover{background:var(--porcelain);color:var(--rose);border-color:var(--rose)}
  .pinbtn.pinned{color:var(--rose);border-color:var(--rose);background:#FBF0F2}
  .pinbtn svg{width:14px;height:14px}

  /* ── trash button ── */
  .trashbtn{background:none;border:1px solid transparent;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);transition:background .15s,color .15s,border-color .15s,opacity .15s;flex-shrink:0;opacity:0;pointer-events:none}
  .card:hover .trashbtn,.card.gen-open .trashbtn{opacity:1;pointer-events:auto}
  .trashbtn:hover{color:var(--clay);border-color:var(--clay);background:#FDF0EC}
  .trashbtn svg{width:13px;height:13px}

  .expandbtn{background:none;border:1px solid var(--hairline-strong);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:background .15s,color .15s;flex-shrink:0}
  .expandbtn:hover{background:var(--porcelain);color:var(--ink)}
  .expandbtn svg{transition:transform .25s ease}.card.open .expandbtn svg{transform:rotate(180deg)}

  /* ── generation panel ── */
  .genpanel{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--hairline-strong)}
  .card.gen-open .genpanel{display:block}
  .genpills{display:flex;gap:5px;flex-wrap:wrap}
  .genpill{font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:none;border:1px solid var(--hairline-strong);border-radius:99px;padding:4px 11px;cursor:pointer;transition:background .12s,color .12s,border-color .12s;white-space:nowrap}
  .genpill:hover{background:var(--porcelain);color:var(--ink)}
  .genpill.active{background:var(--sage);color:var(--paper);border-color:var(--sage)}
  .genpill:disabled{opacity:.45;cursor:default}
  .gen-actions-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .gen-status{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);font-style:italic;flex:1}
  .gen-runbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;background:var(--ink);color:var(--paper);border:none;border-radius:7px;padding:6px 16px;cursor:pointer;transition:background .15s;flex-shrink:0}
  .gen-runbtn:hover:not(:disabled){background:#2C362F}
  .gen-runbtn:disabled{opacity:.35;cursor:default}
  .gen-results-area{margin-top:8px;display:flex;flex-direction:column;gap:8px}
  .gen-result-block{background:var(--porcelain);border-radius:9px;padding:11px 14px}
  .gen-result-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);margin-bottom:6px}
  .gen-result-content{font-family:'Newsreader',serif;font-size:13.5px;line-height:1.75;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .gen-result-content.loading{color:var(--ink-faint);font-style:italic}
  .gen-result-content.error{color:var(--clay)}
  .gen-result-copy{margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:none;border:1px solid var(--hairline-strong);border-radius:5px;padding:3px 10px;cursor:pointer;transition:background .12s}
  .gen-result-copy:hover{background:var(--paper)}
  .gen-err{display:none;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--clay);background:#FDF0EC;border:1px solid #EBCBB5;border-radius:8px;padding:8px 12px}

  .detail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
  .card.open .detail{grid-template-rows:1fr}
  .detail-inner{overflow:hidden}
  .detail-pad{margin-top:16px;padding-top:16px;border-top:1px dashed var(--hairline-strong);display:grid;gap:16px}
  .detail h4{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px}
  .bars{display:grid;gap:6px}
  .bar{display:grid;grid-template-columns:130px 1fr 28px;align-items:center;gap:10px}
  .bar .blbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);text-transform:capitalize}
  .bar .track{height:6px;background:var(--porcelain);border-radius:3px;overflow:hidden}
  .bar .fill{height:100%;background:var(--sage);border-radius:3px;width:0;transition:width .5s ease}
  .bar .bval{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);text-align:right}
  .srclist{display:flex;flex-direction:column;gap:7px}
  .srclist a{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);text-decoration:none;display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
  .srclist a:hover{color:var(--ink)}
  .srclist .role{color:var(--sage);text-transform:uppercase;font-size:9.5px;letter-spacing:.06em;min-width:96px}
  .srclist .tval{color:var(--clay);font-weight:600}

  /* ── history section ── */
  .history-section{margin-top:44px;border-top:1px solid var(--hairline);padding-top:22px}
  .history-section summary{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;list-style:none}
  .history-section summary::-webkit-details-marker{display:none}
  .history-section summary::before{content:"▶";font-size:9px;transition:transform .2s}
  .history-section[open] summary::before{transform:rotate(90deg)}
  .history-section summary .hist-count{font-weight:400;color:var(--stone)}
  .hist-feed{margin-top:18px;display:flex;flex-direction:column;gap:10px}
  .hist-card{background:var(--paper);border:1px solid var(--hairline);border-radius:10px;padding:14px 16px;opacity:.8;transition:opacity .15s}
  .hist-card:hover{opacity:1}
  .hist-headline{font-family:'Newsreader',serif;font-weight:500;font-size:16px;line-height:1.25;color:var(--ink)}
  .hist-meta{margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint)}
  .hist-meta .hscore{color:var(--clay);font-weight:600}
  .hist-meta a{color:var(--ink-soft);text-decoration:none}
  .hist-meta a:hover{color:var(--ink)}
  .hist-dismissed{color:var(--stone)}
  .hist-restorebtn{font-family:'IBM Plex Mono',monospace;font-size:10px;background:none;border:1px solid var(--hairline-strong);border-radius:5px;padding:2px 8px;cursor:pointer;color:var(--sage);transition:background .12s,border-color .12s}
  .hist-restorebtn:hover{background:#E4EDE6;border-color:var(--sage)}

  /* ── generated view ── */
  .gen-view-header{display:flex;align-items:center;gap:14px;margin-top:22px;margin-bottom:22px}
  .gen-view-backbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;background:none;border:1px solid var(--hairline-strong);border-radius:7px;padding:5px 11px;cursor:pointer;color:var(--ink-soft);transition:background .12s,color .12s}
  .gen-view-backbtn:hover{background:var(--paper);color:var(--ink)}
  .gen-view-title{font-family:'Newsreader',serif;font-size:22px;font-weight:600;color:var(--ink)}
  .gen-view-empty{margin-top:60px;text-align:center;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.7}
  .gen-view-feed{display:flex;flex-direction:column;gap:16px;padding-bottom:80px}
  .gen-view-card{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}
  .gen-view-headline{font-family:'Newsreader',serif;font-weight:600;font-size:18px;line-height:1.25;color:var(--ink)}
  .gen-view-meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin-top:4px;margin-bottom:14px}
  .gen-view-section{border-top:1px solid var(--hairline);padding:12px 0 4px}
  .gen-view-comp-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);margin-bottom:8px}
  .gen-view-comp-content{font-family:'Newsreader',serif;font-size:14px;line-height:1.75;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .gen-view-copy{margin-top:8px;display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:none;border:1px solid var(--hairline-strong);border-radius:5px;padding:3px 10px;cursor:pointer;transition:background .12s}
  .gen-view-copy:hover{background:var(--porcelain)}
  .gen-view-delete{margin-left:8px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:3px 6px;transition:color .12s}
  .gen-view-delete:hover{color:var(--clay)}

  /* ── toast ── */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:#9FC3AC}

  footer{max-width:760px;margin:40px auto 0;padding-top:18px;border-top:1px solid var(--hairline);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}

  @media (max-width:600px){
    body{padding:0 12px 80px}
    .brand{font-size:26px}
    .dateline{text-align:left;width:100%}
    .brandrow{gap:8px}
    .standfirst{font-size:14.5px}
    .metabar{gap:8px;font-size:11px}
    .sortbar{flex-wrap:wrap}
    .headerbtns{margin-left:0;width:100%}
    .headerbtn{flex:1;justify-content:center;padding:9px 11px;font-size:12px;text-align:center}

    .card{padding:14px 14px 14px 20px}
    .rank{display:none}
    .scorebox{min-width:40px}
    .score{font-size:22px}
    .headline{font-size:17px}
    .summary{font-size:13.5px}

    .footrow{flex-wrap:wrap;gap:8px}
    .actions{margin-left:0;width:100%;justify-content:flex-start;gap:6px;margin-top:2px}
    .pickbtn{flex:1;padding:9px 10px;font-size:13px;text-align:center}
    .pinbtn,.expandbtn,.trashbtn{width:40px;height:40px}
    .trashbtn{opacity:1;pointer-events:auto}

    .genpills{gap:5px}
    .genpill{flex:1;min-width:calc(50% - 4px);padding:8px 6px;font-size:11.5px;text-align:center;border-radius:8px}
    .gen-result-content{font-size:13px;padding:0}

    .bar{grid-template-columns:90px 1fr 24px}
  }
  @media (max-width:380px){.genpill{min-width:100%}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="brandrow">
      <div class="brand">Feed Cockpit <span class="pack" id="packName">wellness-genz</span></div>
      <div class="dateline" id="dateline">loading…</div>
    </div>
    <div class="standfirst">A no-AI pipeline pulls your feeds and ranks them by relevance. You judge the angle and pick what to generate.</div>
    <div class="metabar">
      <span><b id="liveCount">—</b> live</span>
      <span><b id="keptStat">—</b> kept</span>
      <span><b id="feedsStat">—</b> feeds</span>
      <div class="sortbar">
        <span class="sortbar-label">sort</span>
        <button class="sortbtn active" data-sort="date">Date</button>
        <button class="sortbtn" data-sort="score">Score</button>
      </div>
      <div class="headerbtns">
        <button class="headerbtn" id="genTabBtn">Generated<span class="genbadge" id="genBadge" style="display:none">0</span></button>
        <button class="headerbtn" id="reloadBtn">↻ refresh feed</button>
      </div>
    </div>
    <div class="notice" id="notice"></div>
    <div class="update-banner" id="updateBanner">
      <span>Feed updated — new stories available</span>
      <button id="applyUpdateBtn">Apply</button>
    </div>
  </header>

  <div class="views-container">
    <div id="viewsInner">

      <!-- Feed pane -->
      <div class="view-pane" id="feedPane">
        <div class="feed" id="feed"></div>
        <details class="history-section" id="historySection">
          <summary>Past Stories <span class="hist-count" id="histCount"></span></summary>
          <div class="hist-feed" id="histFeed"></div>
        </details>
        <footer>
          <span id="genStamp">—</span>
          <span>no-AI pipeline · angle &amp; voice judged downstream</span>
        </footer>
      </div>

      <!-- Generated content pane -->
      <div class="view-pane" id="genPane">
        <div class="gen-view-header">
          <button class="gen-view-backbtn" id="backToFeedBtn">← Back to Feed</button>
          <span class="gen-view-title">Generated</span>
        </div>
        <div id="genViewFeed"></div>
      </div>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate = iso => { try { return new Date(iso).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); } catch { return iso; } };
const fmtShortDate = iso => { try { return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); } catch { return ''; } };

const ANGLE_HINT = {unscored:'Not yet judged — code ranked this by relevance; decide the wellness angle when you pick it.'};
const GENERATE_URL = '/generate';

// ── state ──
let currentSort = 'date';
let currentData = null;
let lastGenAt = null;
let pendingData = null;
let pinnedIds = new Set();

// ── localStorage keys ──
const PINS_LS_KEY      = 'feedcockpit_pins';
const DISMISSED_LS_KEY = 'feedcockpit_dismissed';
const GENERATED_LS_KEY = 'feedcockpit_generated';

let dismissedMap = {};   // { id: { story, dismissed_at } }
let generatedMap = {};   // { id: { story, results: { component: content } } }

// ── pins ──
async function loadPins() {
  const stored = localStorage.getItem(PINS_LS_KEY);
  if (stored) { try { pinnedIds = new Set(JSON.parse(stored)); return; } catch {} }
  try {
    const r = await fetch('/pins');
    if (!r.ok) return;
    const p = await r.json();
    pinnedIds = new Set(p.pinned_ids || []);
    localStorage.setItem(PINS_LS_KEY, JSON.stringify([...pinnedIds]));
  } catch {}
}

async function togglePin(story) {
  const id = story.id;
  const nowPinned = !pinnedIds.has(id);
  if (nowPinned) pinnedIds.add(id); else pinnedIds.delete(id);
  localStorage.setItem(PINS_LS_KEY, JSON.stringify([...pinnedIds]));
  if (currentData) {
    const s = currentData.stories.find(x => x.id === id);
    if (s) s.pinned = nowPinned;
  }
  try {
    await fetch('/pins', {method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id, pinned: nowPinned, story})});
  } catch {}
  rerender();
  toast(nowPinned ? '📌 Pinned — stays through refreshes' : 'Unpinned');
}

// ── dismissed ──
function loadDismissed() {
  try { dismissedMap = JSON.parse(localStorage.getItem(DISMISSED_LS_KEY) || '{}'); } catch { dismissedMap = {}; }
}

function dismissStory(story) {
  const id = story.id;
  if (pinnedIds.has(id)) {
    pinnedIds.delete(id);
    localStorage.setItem(PINS_LS_KEY, JSON.stringify([...pinnedIds]));
    try { fetch('/pins',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,pinned:false})}); } catch {}
  }
  dismissedMap[id] = { story, dismissed_at: new Date().toISOString() };
  localStorage.setItem(DISMISSED_LS_KEY, JSON.stringify(dismissedMap));
  if (currentData?.stories) currentData.stories = currentData.stories.filter(s => s.id !== id);
  rerender();
  renderHistory();
  toast('Removed — find it in Past Stories');
}

function restoreStory(id) {
  const entry = dismissedMap[id];
  if (!entry) return;
  const story = entry.story || entry;
  delete dismissedMap[id];
  localStorage.setItem(DISMISSED_LS_KEY, JSON.stringify(dismissedMap));
  if (currentData?.stories && !currentData.stories.find(s => s.id === id)) {
    currentData.stories.push({...story, pinned: false});
  }
  rerender();
  renderHistory();
  toast('Story restored to feed');
}

// ── generated content ──
function loadGenerated() {
  try { generatedMap = JSON.parse(localStorage.getItem(GENERATED_LS_KEY) || '{}'); } catch { generatedMap = {}; }
}

function saveGenerated(storyId, component, content, story) {
  if (!generatedMap[storyId]) generatedMap[storyId] = { story, results: {} };
  generatedMap[storyId].results[component] = content;
  generatedMap[storyId].story = story;
  localStorage.setItem(GENERATED_LS_KEY, JSON.stringify(generatedMap));
  updateGenBadge();
}

function updateGenBadge() {
  const count = Object.values(generatedMap).filter(x => x.results && Object.keys(x.results).length > 0).length;
  const badge = $('#genBadge');
  if (count > 0) { badge.textContent = count; badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

// ── generated view ──
function renderGeneratedView() {
  const items = Object.values(generatedMap).filter(x => x.results && Object.keys(x.results).length > 0);
  if (!items.length) {
    $('#genViewFeed').innerHTML = '<div class="gen-view-empty">No generated content yet.<br>Select pills on any story card and press Generate.</div>';
    return;
  }
  $('#genViewFeed').innerHTML = items.map(item => {
    const s = item.story;
    const src = (s.sources||[])[0];
    const sections = Object.entries(item.results).map(([comp, content]) => `
      <div class="gen-view-section">
        <div class="gen-view-comp-label">${esc(comp)}</div>
        <div class="gen-view-comp-content">${esc(content)}</div>
        <button class="gen-view-copy" data-content="${esc(content)}">Copy</button>
        <button class="gen-view-delete" data-id="${esc(s.id)}" data-comp="${esc(comp)}" title="Delete">✕</button>
      </div>`).join('');
    return `<div class="gen-view-card">
      <div class="gen-view-headline">${esc(s.headline)}</div>
      <div class="gen-view-meta">${src ? esc(src.outlet)+' · ' : ''}score ${Number(s.score||0).toFixed(1)}</div>
      ${sections}
    </div>`;
  }).join('');

  $('#genViewFeed').querySelectorAll('.gen-view-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard?.writeText(btn.dataset.content).catch(()=>{});
      toast('Copied');
    });
  });
  $('#genViewFeed').querySelectorAll('.gen-view-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id, comp = btn.dataset.comp;
      if (generatedMap[id]) {
        delete generatedMap[id].results[comp];
        if (!Object.keys(generatedMap[id].results).length) delete generatedMap[id];
        localStorage.setItem(GENERATED_LS_KEY, JSON.stringify(generatedMap));
        updateGenBadge();
        renderGeneratedView();
      }
    });
  });
}

// ── view switching ──
let currentView = 'feed';
function switchView(view) {
  currentView = view;
  $('#feedPane').classList.toggle('active', view === 'feed');
  $('#genPane').classList.toggle('active', view === 'generated');
  $('#genTabBtn').classList.toggle('active', view === 'generated');
  if (view === 'generated') renderGeneratedView();
}

$('#genTabBtn').addEventListener('click', () => switchView(currentView === 'generated' ? 'feed' : 'generated'));
$('#backToFeedBtn').addEventListener('click', () => switchView('feed'));

// ── load & render ──
async function load(silent=false) {
  if (!silent) $('#notice').className = 'notice';
  try {
    const res = await fetch('feed.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    (data.stories || []).forEach(s => {
      s.pinned = pinnedIds.has(s.id);
      // filter out locally dismissed stories
      if (dismissedMap[s.id]) data.stories = (data.stories||[]).filter(x => x.id !== s.id);
    });
    // re-filter after inline mutation above
    data.stories = (data.stories||[]).filter(s => !dismissedMap[s.id]);
    lastGenAt = data.meta?.generated_at;
    currentData = data;
    render(data);
    renderHistory();
  } catch(e) {
    if (!silent) {
      const n = $('#notice'); n.className = 'notice err';
      n.innerHTML = "Couldn't load <code>feed.json</code>. If you opened this file directly, "+
        "browsers block local reads. Serve the folder instead: run "+
        "<code>python3 serve.py</code> in this folder, then open "+
        "<code>http://localhost:8000/cockpit.html</code>.";
      $('#dateline').textContent = 'no data';
    }
  }
}

function rerender() { if (currentData) render(currentData); }

function render(data) {
  const m = data.meta || {};
  $('#packName').textContent = m.pack || 'feed';
  $('#dateline').textContent = 'updated ' + fmtDate(m.generated_at);
  $('#liveCount').textContent = m.live_count ?? (data.stories || []).length;
  $('#keptStat').textContent = m.stats ? m.stats.kept : '—';
  $('#feedsStat').textContent = m.stats ? m.stats.feeds_ok : '—';
  $('#genStamp').textContent = 'generated ' + fmtDate(m.generated_at);

  if (m.dead_feeds && m.dead_feeds.length) {
    const n = $('#notice'); n.className = 'notice warn';
    n.innerHTML = 'Dead feeds skipped: <b>' + m.dead_feeds.map(esc).join(', ') + '</b> — check URLs in <code>sources.yaml</code>.';
  }

  const stories = sortStories([...(data.stories || [])]);
  $('#feed').innerHTML = stories.map((s, i) => card(s, i)).join('') ||
    '<div class="notice warn" style="display:block">Feed is empty. Run <code>python3 fetch_feed.py</code> to pull stories.</div>';

  bindCardEvents();
}

function sortStories(stories) {
  const pinned = stories.filter(s => s.pinned);
  const unpinned = stories.filter(s => !s.pinned);
  const sorter = currentSort === 'score'
    ? (a, b) => b.score - a.score
    : (a, b) => {
        const da = a.score_breakdown?.published ? new Date(a.score_breakdown.published) : new Date(0);
        const db = b.score_breakdown?.published ? new Date(b.score_breakdown.published) : new Date(0);
        return db - da;
      };
  return [...pinned.sort(sorter), ...unpinned.sort(sorter)];
}

function bindCardEvents() {
  // expand
  $('#feed').querySelectorAll('.expandbtn, .headline').forEach(el => el.addEventListener('click', e => {
    const c = e.target.closest('.card'); c.classList.toggle('open');
    if (c.classList.contains('open'))
      c.querySelectorAll('.fill').forEach(f => requestAnimationFrame(() => f.style.width = (f.dataset.v * 10) + '%'));
  }));

  // generate panel toggle
  $('#feed').querySelectorAll('.pickbtn').forEach(b => b.addEventListener('click', e => {
    const card = e.target.closest('.card');
    card.classList.toggle('gen-open');
    b.classList.toggle('active', card.classList.contains('gen-open'));
  }));

  // pill multi-select
  $('#feed').querySelectorAll('.genpill').forEach(pill => pill.addEventListener('click', e => {
    e.stopPropagation();
    pill.classList.toggle('active');
    const card = pill.closest('.card');
    const anyActive = [...card.querySelectorAll('.genpill')].some(p => p.classList.contains('active'));
    card.querySelector('.gen-runbtn').disabled = !anyActive;
  }));

  // generate run button
  $('#feed').querySelectorAll('.gen-runbtn').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const card = btn.closest('.card');
    const id = card.dataset.id;
    const story = currentData?.stories.find(s => s.id === id);
    if (!story) return;

    const selected = [...card.querySelectorAll('.genpill.active')].map(p => p.dataset.component);
    if (!selected.length) return;

    const statusEl  = card.querySelector('.gen-status');
    const resultsArea = card.querySelector('.gen-results-area');
    const errEl     = card.querySelector('.gen-err');

    btn.disabled = true;
    card.querySelectorAll('.genpill').forEach(p => p.disabled = true);
    errEl.style.display = 'none';
    resultsArea.innerHTML = '';
    resultsArea.style.display = 'flex';

    for (const component of selected) {
      const block = document.createElement('div');
      block.className = 'gen-result-block';
      block.innerHTML = `<div class="gen-result-label">${esc(component)}</div><div class="gen-result-content loading">generating…</div>`;
      resultsArea.appendChild(block);
      const contentEl = block.querySelector('.gen-result-content');
      statusEl.textContent = component + '…';
      try {
        const r = await fetch(GENERATE_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({story, component}),
        });
        const j = await r.json().catch(() => ({}));
        if (j.ok) {
          contentEl.textContent = j.content;
          contentEl.classList.remove('loading');
          const copyBtn = document.createElement('button');
          copyBtn.className = 'gen-result-copy';
          copyBtn.textContent = 'Copy';
          copyBtn.onclick = () => { navigator.clipboard?.writeText(j.content).catch(()=>{}); toast('Copied'); };
          block.appendChild(copyBtn);
          saveGenerated(id, component, j.content, story);
        } else {
          contentEl.textContent = j.error || 'Generation failed';
          contentEl.classList.remove('loading');
          contentEl.classList.add('error');
        }
      } catch {
        const isLocal = ['localhost','127.0.0.1'].includes(location.hostname);
        contentEl.textContent = isLocal
          ? 'Needs ANTHROPIC_API_KEY — export ANTHROPIC_API_KEY=sk-ant-... then restart serve.py'
          : 'Set ANTHROPIC_API_KEY in Netlify → Site settings → Environment variables';
        contentEl.classList.remove('loading');
        contentEl.classList.add('error');
      }
    }
    statusEl.textContent = '';
    btn.disabled = false;
    card.querySelectorAll('.genpill').forEach(p => { p.disabled = false; });
  }));

  // pin
  $('#feed').querySelectorAll('.pinbtn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const id = btn.dataset.id;
    const story = currentData?.stories.find(s => s.id === id);
    if (story) togglePin(story);
  }));

  // trash
  $('#feed').querySelectorAll('.trashbtn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const id = btn.dataset.id;
    const story = currentData?.stories.find(s => s.id === id);
    if (story) dismissStory(story);
  }));
}

// ── card template ──
function card(s, i) {
  const rank = String(i + 1).padStart(2, '0');
  const angle = s.angle_tag || 'unscored';
  const angleLine = s.angle_line || ANGLE_HINT[angle] || '';
  const kw = (s.keyword_hits || s.topic_tags || []).slice(0, 6).map(k => `<span class="kw">${esc(k)}</span>`).join('');
  const srcChips = (s.sources || []).map(src =>
    `<a class="src" href="${esc(src.url)}" target="_blank" rel="noopener"><span class="tierbadge">T${esc(src.tier)}</span>${esc(src.outlet)}</a>`
  ).join('');
  const bd = s.score_breakdown || {};
  const bars = Object.entries(bd).filter(([k, v]) => typeof v === 'number').map(([k, v]) =>
    `<div class="bar"><span class="blbl">${esc(k.replace(/_/g,' '))}</span><span class="track"><span class="fill" data-v="${v}"></span></span><span class="bval">${v}</span></div>`
  ).join('');
  const pub = bd.published
    ? `<div class="bar"><span class="blbl">published</span><span class="bval" style="grid-column:2/4;text-align:left;color:var(--ink-soft)">${esc(fmtDate(bd.published))}</span></div>` : '';
  const srcList = (s.sources || []).map(src =>
    `<a href="${esc(src.url)}" target="_blank" rel="noopener"><span class="role">${esc(src.role)}</span><span class="tval">Tier ${esc(src.tier)}</span><span>${esc(src.outlet)}</span></a>`
  ).join('');
  const isPinned = pinnedIds.has(s.id);
  const pubDate = s.score_breakdown?.published ? new Date(s.score_breakdown.published) : null;
  const today = new Date();
  const isNew = pubDate &&
    pubDate.getFullYear() === today.getFullYear() &&
    pubDate.getMonth() === today.getMonth() &&
    pubDate.getDate() === today.getDate();
  const tagParts = [
    isPinned ? `<span class="card-tag card-tag--pinned">PINNED</span>` : '',
    isNew    ? `<span class="card-tag card-tag--new">NEW</span>` : '',
  ].filter(Boolean).join('');
  const tagsHtml = tagParts ? `<div class="card-tags">${tagParts}</div>` : '';
  const pubDateStr = pubDate ? fmtShortDate(pubDate.toISOString()) : '';

  const heartFilled = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
  const heartEmpty = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
  const trashIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

  return `<article class="card ${esc(angle)}${isPinned ? ' pinned' : ''}${isNew ? ' is-new' : ''}" data-id="${esc(s.id)}">${tagsHtml}
    <div class="toprow">
      <div class="rank">${rank}</div>
      <div class="scorebox"><div class="score">${Number(s.score).toFixed(1)}</div><div class="scorelbl">relevance</div></div>
      <div class="headcol">
        <div class="headline">${esc(s.headline)}</div>
        <div class="summary">${esc(s.summary)}</div>
        <div class="tagrow">${kw}</div>
        <div class="angle"><span class="tag ${esc(angle)}">${esc(angle)}</span><span class="line">${esc(angleLine)}</span></div>
        <div class="footrow">${srcChips}<span class="verified">✓ ${esc(s.verification)}</span>
          <div class="actions">
            <button class="pickbtn${pinnedIds.has(s.id)||false?' ':' '}" data-id="${esc(s.id)}">Generate</button>
            <button class="trashbtn" data-id="${esc(s.id)}" title="Remove story">${trashIcon}</button>
            <button class="pinbtn${isPinned ? ' pinned' : ''}" data-id="${esc(s.id)}" title="${isPinned ? 'Unpin' : 'Pin story'}">${isPinned ? heartFilled : heartEmpty}</button>
            <button class="expandbtn" aria-label="Details"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        ${pubDateStr ? `<div class="pub-date">${esc(pubDateStr)}</div>` : ''}
      </div>
    </div>
    <div class="genpanel">
      <div class="genpills">
        <button class="genpill" data-component="script">Script</button>
        <button class="genpill" data-component="hooks">Hooks</button>
        <button class="genpill" data-component="captions">Captions</button>
        <button class="genpill" data-component="package">Full Package</button>
        <button class="genpill" data-component="breakdown">Breakdown</button>
        <button class="genpill" data-component="instagram">Instagram</button>
        <button class="genpill" data-component="text-overlays">Text Overlays</button>
        <button class="genpill" data-component="thread">Thread</button>
      </div>
      <div class="gen-actions-row">
        <span class="gen-status"></span>
        <button class="gen-runbtn" disabled>Generate</button>
      </div>
      <div class="gen-results-area" style="display:none"></div>
      <div class="gen-err"></div>
    </div>
    <div class="detail"><div class="detail-inner"><div class="detail-pad">
      <div><h4>Relevance breakdown (no-AI)</h4><div class="bars">${bars}${pub}</div></div>
      <div><h4>Sources &amp; roles</h4><div class="srclist">${srcList}</div></div>
    </div></div></div>
  </article>`;
}

// ── history / past stories ──
async function renderHistory() {
  // local dismissed (from trash button)
  const localItems = Object.values(dismissedMap).sort((a,b) => new Date(b.dismissed_at)-new Date(a.dismissed_at));

  // server dismissed (aged out via fetch_feed.py) — local serve.py only
  let serverItems = [];
  try {
    const r = await fetch('/dismissed');
    if (r.ok) serverItems = await r.json();
  } catch {}

  // merge: server items not already in our local dismissed map
  const localIds = new Set(Object.keys(dismissedMap));
  for (const s of serverItems) {
    const sid = s.id || s.story?.id;
    if (sid && !localIds.has(sid)) localItems.push(s);
  }

  if (!localItems.length) { $('#historySection').style.display = 'none'; return; }
  $('#historySection').style.display = '';
  $('#histCount').textContent = `(${localItems.length})`;

  $('#histFeed').innerHTML = localItems.map(entry => {
    const s = entry.story || entry;
    const id = s.id;
    const src = (s.sources || [])[0];
    const pubIso = s.score_breakdown?.published;
    const canRestore = !!dismissedMap[id];
    return `<div class="hist-card">
      <div class="hist-headline">${esc(s.headline)}</div>
      <div class="hist-meta">
        <span class="hscore">${Number(s.score||0).toFixed(1)}</span>
        ${src ? `<a href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.outlet)}</a>` : ''}
        ${pubIso ? `<span>${fmtShortDate(pubIso)}</span>` : ''}
        <span class="hist-dismissed">removed ${fmtDate(entry.dismissed_at)}</span>
        ${canRestore ? `<button class="hist-restorebtn" data-id="${esc(id)}">↩ restore</button>` : ''}
      </div>
    </div>`;
  }).join('');

  $('#histFeed').querySelectorAll('.hist-restorebtn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); restoreStory(btn.dataset.id); });
  });
}

// ── sort buttons ──
document.querySelectorAll('.sortbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentSort = btn.dataset.sort;
    document.querySelectorAll('.sortbtn').forEach(b => b.classList.toggle('active', b === btn));
    rerender();
  });
});

// ── refresh button ──
$('#reloadBtn').addEventListener('click', async () => {
  const btn = $('#reloadBtn');
  const orig = btn.textContent;
  btn.textContent = '↻ fetching…';
  btn.disabled = true;
  $('#updateBanner').classList.remove('show');
  try {
    const r = await fetch('/refresh', {method:'POST'});
    const j = await r.json().catch(() => ({}));
    if (r.ok) {
      const match = (j.output || '').match(/(\d+) in feed/);
      toast('RSS pulled · <b>' + (match ? match[0] + ' stories' : 'feed updated') + '</b>');
    } else {
      const isLocal = ['localhost','127.0.0.1'].includes(location.hostname);
      if (isLocal) toast('Refresh error — check terminal output');
      else toast('Feed updates automatically every hour — showing latest');
    }
  } catch {
    const isLocal = ['localhost','127.0.0.1'].includes(location.hostname);
    if (isLocal) {
      const n = $('#notice'); n.className = 'notice warn';
      n.innerHTML = 'Live refresh requires <code>serve.py</code>. Run <code>python3 serve.py</code> in this folder, then open <code>http://localhost:8000/cockpit.html</code>.';
    } else {
      toast('Feed updates automatically — showing latest available');
    }
  }
  await load();
  btn.textContent = orig;
  btn.disabled = false;
});

// ── auto-poll ──
$('#applyUpdateBtn').addEventListener('click', async () => {
  $('#updateBanner').classList.remove('show');
  if (pendingData) {
    (pendingData.stories || []).forEach(s => { s.pinned = pinnedIds.has(s.id); });
    lastGenAt = pendingData.meta?.generated_at;
    currentData = pendingData;
    pendingData = null;
    render(currentData);
    renderHistory();
  }
});

setInterval(async () => {
  try {
    const r = await fetch('feed.json?t=' + Date.now());
    if (!r.ok) return;
    const data = await r.json();
    const newGenAt = data.meta?.generated_at;
    if (lastGenAt && newGenAt && newGenAt !== lastGenAt) {
      pendingData = data;
      $('#updateBanner').classList.add('show');
    }
  } catch {}
}, 30000);

// ── toast ──
let tt;
function toast(html) {
  const el = $('#toast'); el.innerHTML = html; el.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 3200);
}

// ── init ──
(async () => {
  loadDismissed();
  loadGenerated();
  updateGenBadge();
  $('#feedPane').classList.add('active');
  await loadPins();
  await load();
})();
</script>
</body>
</html>
